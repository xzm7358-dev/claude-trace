name: NodeJS with Grunt

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm install
        npm install grunt --no-save
        npm install grunt-contrib-uglify --no-save
        
    - name: Verify Grunt setup
      run: |
        echo "Checking installed packages:"
        npm list grunt grunt-cli --depth=0
        echo "Checking Gruntfile existence:"
        ls -l Gruntfile.js
        
    - name: Run Grunt build
      run: npx grunt
